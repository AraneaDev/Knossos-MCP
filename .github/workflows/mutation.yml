name: Mutation

# A full-src Infection run takes ~80 minutes, so it is not wired into the
# Quality workflow or any tools/quality profile. It runs on a weekly schedule so
# the mutation floor in infection.json5 is actually exercised against the full
# source tree (and can be ratcheted upward honestly against measured results),
# and can also be triggered from the Actions tab on demand.
on:
  workflow_dispatch:
  schedule:
    # 07:00 UTC every Monday.
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  infection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build pinned quality image
        run: docker build --target quality -t knossos-mcp:quality .
      - name: Run Infection over src
        run: |
          docker run --rm -e KNOSSOS_QUALITY_CONTAINER=1 --entrypoint sh knossos-mcp:quality \
            -c 'php -d pcov.enabled=1 vendor/bin/infection --no-interaction --no-progress --threads=4'
