name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build pinned quality image
        run: docker build --target quality -t knossos-mcp:quality .
      # Reports are copied out of the container instead of bind-mounted back.
      # A runner whose workspace is itself a container mount cannot bind host
      # paths that only exist inside the job, and Docker would silently create
      # an empty directory on the host instead of failing.
      - name: Run full quality profile
        run: |
          docker run --name knossos-quality -e KNOSSOS_QUALITY_CONTAINER=1 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            knossos-mcp:quality full
      - name: Collect reports
        if: always()
        run: |
          docker cp knossos-quality:/opt/knossos/coverage ./coverage
          docker rm knossos-quality
      - name: Upload coverage and benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: coverage/
          if-no-files-found: error
